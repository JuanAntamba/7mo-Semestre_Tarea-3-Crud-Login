<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - UDLAEats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger">UDLAEats 🎓</h2>
            <p class="text-muted">Ingresa con tu cuenta universitaria</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn btn-danger w-100 fw-bold rounded-pill">Entrar a Pedir</button>
        </form>
    </div>

</body>
</html>
