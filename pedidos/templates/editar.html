<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Pedido - UDLAEats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 100%; max-width: 500px; border-radius: 15px;">
        <h3 class="fw-bold mb-4 text-center">Editar tu Pedido ✏️</h3>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-muted fw-bold">Platillo</label>
                <input type="text" name="platillo" class="form-control" value="{{ pedido.platillo }}" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted fw-bold">Cantidad</label>
                <input type="number" name="cantidad" class="form-control" value="{{ pedido.cantidad }}" min="1" required>
            </div>
            
            <div class="d-flex gap-2">
                <a href="{% url 'panel' %}" class="btn btn-secondary w-50 fw-bold rounded-pill">Cancelar</a>
                <button type="submit" class="btn btn-primary w-50 fw-bold rounded-pill">Guardar Cambios</button>
            </div>
        </form>
    </div>

</body>
</html>
